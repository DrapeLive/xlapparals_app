name: xlapparals_app
description: "A new Flutter project."
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
  dio: ^5.9.2
  connectivity_plus: ^7.1.1
  go_router: ^17.2.3
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  flutter_secure_storage: ^10.3.1
  google_fonts: ^8.1.0
  intl: ^0.20.2
  equatable: ^2.0.8
  shared_preferences: ^2.5.5
  cached_network_image: ^3.4.1
  mobile_scanner: ^7.2.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  printing: ^5.14.3
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  android: true
  ios: true
  color: "#FFFFFF"
  image: assets/icon/icon.png
  image_dark: assets/icon/icon.png
  image_android: assets/icon/icon.png
  image_dark_android: assets/icon/icon.png
  image_ios: assets/icon/icon.png
  image_dark_ios: assets/icon/icon.png

  android_gravity: center # bottom, center, center_horizontal, center_vertical,

  ios_content_mode: center # scaleToFill, scaleAspectFit, scaleAspectFill,

  fullscreen: true # default false

  android_12:
    # background color
    color: "#FFFFFF"
    background_color: "#FFFFFF"

    image: assets/icon/icon.png
    image_dark: assets/icon/icon.png

    icon_background_color: "#FFFFFF"
    icon_background_color_dark: "#FFFFFF"
